<!DOCTYPE html>
<html>

<head>
    <title>WFO Schedule Indonesia</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .filters {
            margin-bottom: 15px;
        }

        select {
            padding: 6px;
            margin-right: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .full {
            background: gold;
            font-weight: bold;
        }

        .holiday {
            background: red;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>WFO Schedule (Smart Rotation)</h2>

    <div id="teamNotes" style="
        margin-bottom: 15px;
        padding: 10px;
        background: #eef3f7;
        border-left: 4px solid #2c3e50;
        font-size: 14px;
    ">
        <strong>Notes:</strong>
        <div id="teamNotesContent"></div>
    </div>


    <div class="filters">
        <label>Bulan:</label>
        <select id="monthFilter">
            <option value="">Semua</option>
        </select>

        <label>Tahun:</label>
        <select id="yearFilter">
            <option value="">Semua</option>
        </select>

        <label>Hari:</label>
        <select id="dayFilter">
            <option value="">Semua</option>
            <option value="Senin">Senin</option>
            <option value="Selasa">Selasa</option>
            <option value="Rabu">Rabu</option>
            <option value="Kamis">Kamis</option>
            <option value="Jumat">Jumat</option>
        </select>

        <label>Team:</label>
        <select id="teamFilter">
            <option value="">Semua</option>
            <option value="A">Team A</option>
            <option value="B">Team B</option>
            <option value="C">Team C</option>
            <option value="D">Team D</option>
            <option value="Full">Full Team</option>
            <option value="Holiday">Libur</option>
        </select>
    </div>

    <label>Choose Team:</label>
    <select id="exportTeamSelect">
        <option value="A">Team A</option>
        <option value="B">Team B</option>
        <option value="C">Team C</option>
        <option value="D">Team D</option>
    </select>

    <button onclick="exportICS()" style="margin-bottom: 15px;">Export Calendar (.ics)</button>


    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Hari</th>
                <th>Tanggal</th>
                <th>Keterangan</th>
                <th>Cuti</th>
            </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
    </table>

    <script>
        const teamMember = [
            {
                "team": "A",
                "member": ["Ariq", "Fii"]
            },
            {
                "team": "B",
                "member": ["Galu", "Hilmy"]
            },
            {
                "team": "C",
                "member": ["Abror", "Arif"]
            },
            {
                "team": "D",
                "member": ["Rengga", "Dita"]
            },
        ];
        const teams = ["A", "B", "C", "D"]
        const startDate = new Date("2026-05-05");
        const endDate = new Date("2026-12-31");

        let holidays = [
            {
                "date": "2026-01-01",
                "name": "Tahun Baru 2026 Masehi"
            },
            {
                "date": "2026-01-16",
                "name": "Isra Mikraj Nabi Muhammad S.A.W."
            },
            {
                "date": "2026-02-16",
                "name": "Tahun Baru Imlek 2577 Kongzili"
            },
            {
                "date": "2026-02-17",
                "name": "Tahun Baru Imlek 2577 Kongzili"
            },
            {
                "date": "2026-03-18",
                "name": "Hari Suci Nyepi (Tahun Baru Saka 1948)"
            },
            {
                "date": "2026-03-19",
                "name": "Hari Suci Nyepi (Tahun Baru Saka 1948)"
            },
            {
                "date": "2026-03-20",
                "name": "Idul Fitri 1447 Hijriah"
            },
            {
                "date": "2026-03-21",
                "name": "Idul Fitri 1447 Hijriah"
            },
            {
                "date": "2026-03-22",
                "name": "Idul Fitri 1447 Hijriah"
            },
            {
                "date": "2026-04-03",
                "name": "Wafat Yesus Kristus"
            },
            {
                "date": "2026-04-05",
                "name": "Kebangkitan Yesus Kristus (Paskah)"
            },
            {
                "date": "2026-05-01",
                "name": "Hari Buruh Internasional"
            },
            {
                "date": "2026-05-14",
                "name": "Kenaikan Yesus Kristus"
            },
            {
                "date": "2026-05-27",
                "name": "Idul Adha 1447 Hijriah"
            },
            {
                "date": "2026-05-31",
                "name": "Hari Raya Waisak 2570 BE"
            },
            {
                "date": "2026-06-01",
                "name": "Hari Lahir Pancasila"
            },
            {
                "date": "2026-06-16",
                "name": "1 Muharam Tahun Baru Islam 1448 Hijriah"
            },
            {
                "date": "2026-08-17",
                "name": "Proklamasi Kemerdekaan"
            },
            {
                "date": "2026-08-25",
                "name": "Maulid Nabi Muhammad S.A.W."
            },
            {
                "date": "2026-12-25",
                "name": "Hari Raya Natal"
            }
        ]

        let cutiDays = [
            {
                "name": "Abror",
                "tanggal": [
                    "2026-05-28",
                    "2026-05-29"
                ],
                "team": "C"
            },
            {
                "name": "Dita",
                "tanggal": [
                    "2026-05-13",
                    "2026-05-15"
                ],
                "team": "D"
            },
            {
                "name": "Galu",
                "tanggal": [
                    "2026-05-28",
                    "2026-05-29"
                ],
                "team": "B"
            },
            {
                "name": "Rengga",
                "tanggal": [
                    "2026-05-15",
                    "2026-05-18"
                ],
                "team": "D"
            },
        ]

        let data = [];


        function renderTeamNotes() {
            const container = document.getElementById("teamNotesContent");

            container.innerHTML = teamMember
                .map(t => `Team ${t.team}: ${t.member.join(", ")}`)
                .join("<br>");
        }


        // 🔒 SEEDED RANDOM
        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function shuffleWithSeed(array, seed) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(seededRandom(seed + i) * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getHoliday(date) {
            const d = date.toISOString().split("T")[0];
            return holidays.find(h => h.date === d);
        }

        function getCuti(date) {
            const d = date.toISOString().split("T")[0];
            return cutiDays.filter(c => c.tanggal.includes(d)).map(c => c.name);
        }


        // 🔥 CORE LOGIC
        function generateData() {
            let currentDate = new Date(startDate);

            let teamIndex = 0;
            let pendingTeam = null;

            let cycle = 0;
            let currentShuffle = shuffleWithSeed(teams, cycle);

            while (currentDate < endDate) {
                const day = currentDate.getDay();

                if (day !== 0 && day !== 6) {
                    let entry = {
                        date: new Date(currentDate),
                        dayName: currentDate.toLocaleDateString("id-ID", { weekday: "long" }),
                        team: "",
                        cuti: [],
                        isFull: false,
                        isHoliday: false
                    };

                    const holiday = getHoliday(currentDate);

                    if (holiday) {
                        entry.team = holiday.name;
                        entry.isHoliday = true;

                        if (pendingTeam === null) {
                            pendingTeam = currentShuffle[teamIndex % teams.length];
                        }
                    }
                    else if (day === 4) {
                        entry.team = "Full Team";
                        entry.isFull = true;
                    }
                    else {
                        let team;

                        if (pendingTeam !== null) {
                            team = pendingTeam;
                            pendingTeam = null;
                            teamIndex++;
                        } else {
                            team = currentShuffle[teamIndex % teams.length];
                            teamIndex++;
                        }

                        entry.team = team;

                        // 🔁 shuffle tiap cycle
                        if (teamIndex % teams.length === 0) {
                            cycle++;
                            currentShuffle = shuffleWithSeed(teams, cycle);
                        }
                    }

                    data.push(entry);
                }

                currentDate.setDate(currentDate.getDate() + 1);
            }

            data.map((item) => {
                const cuti = getCuti(item.date)
                item.cuti = cuti
            })
        }


        // 🎨 RENDER
        function render() {
            const tbody = document.getElementById("scheduleBody");
            const monthFilter = document.getElementById("monthFilter");
            const yearFilter = document.getElementById("yearFilter");
            const dayFilter = document.getElementById("dayFilter");
            const teamFilter = document.getElementById("teamFilter");

            tbody.innerHTML = "";

            let filtered = data;

            if (monthFilter.value !== "") {
                filtered = filtered.filter(d => d.date.getMonth() == monthFilter.value);
            }

            if (yearFilter.value !== "") {
                filtered = filtered.filter(d => d.date.getFullYear() == yearFilter.value);
            }

            if (dayFilter.value !== "") {
                filtered = filtered.filter(d => d.dayName === dayFilter.value);
            }

            if (teamFilter.value !== "") {
                filtered = filtered.filter(d => {
                    if (teamFilter.value === "Full") return d.isFull;
                    if (teamFilter.value === "Holiday") return d.isHoliday;
                    return d.team === teamFilter.value;
                });
            }

            filtered.forEach((d, i) => {
                const tr = document.createElement("tr");

                if (d.isFull) tr.classList.add("full");
                if (d.isHoliday) tr.classList.add("holiday");

                tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${d.dayName}</td>
            <td>${d.date.toLocaleDateString("id-ID")}</td>
            <td>
                ${d.isHoliday
                        ? d.team
                        : d.isFull
                            ? "Full Team"
                            : "Team " + d.team
                    }
            </td>
            <td>
                ${d.cuti && d.cuti.length ? d.cuti.join(", ") : "-"}
            </td>

        `;

                tbody.appendChild(tr);
            });
        }


        // ⚙️ INIT FILTER
        function initFilters() {
            const monthFilter = document.getElementById("monthFilter");
            const yearFilter = document.getElementById("yearFilter");

            const months = [...new Set(data.map(d => d.date.getMonth()))];
            const years = [...new Set(data.map(d => d.date.getFullYear()))];

            months.forEach(m => {
                const option = document.createElement("option");
                option.value = m;
                option.text = new Date(2026, m).toLocaleString("id-ID", { month: "long" });
                monthFilter.appendChild(option);
            });

            years.forEach(y => {
                const option = document.createElement("option");
                option.value = y;
                option.text = y;
                yearFilter.appendChild(option);
            });

            monthFilter.addEventListener("change", render);
            yearFilter.addEventListener("change", render);
            document.getElementById("teamFilter").addEventListener("change", render);
            document.getElementById("dayFilter").addEventListener("change", render);
        }

        function exportICS() {
            const selectedTeam = document.getElementById("exportTeamSelect").value;

            let ics = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "CALSCALE:GREGORIAN",
                "PRODID:-//WFO Schedule//ID"
            ];

            data.forEach(item => {
                if (item.isHoliday) return;

                if (selectedTeam) {
                    if (!item.isFull && item.team !== selectedTeam) return;
                }

                const ymd = item.date.toISOString().split("T")[0].replace(/-/g, "");

                ics.push(
                    "BEGIN:VEVENT",
                    `UID:${ymd}-${item.team}@wfo`,
                    `DTSTART;VALUE=DATE:${ymd}`,
                    `DTEND;VALUE=DATE:${ymd}`,
                    `SUMMARY:WFO ${"Team " + item.team}`,

                    // ✅ REMINDER H-1
                    "BEGIN:VALARM",
                    "TRIGGER:-P1D",
                    "ACTION:DISPLAY",
                    "DESCRIPTION:Reminder WFO BESOK",
                    "END:VALARM",

                    "END:VEVENT"
                );
            });

            ics.push("END:VCALENDAR");

            const blob = new Blob([ics.join("\r\n")], { type: "text/calendar" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download =`wfo-team-${selectedTeam}.ics`
            a.click();
        }


        // 🚀 INIT
        async function init() {
            generateData();
            initFilters();
            render();
            renderTeamNotes();
        }

        init();
    </script>

</body>

</html>
